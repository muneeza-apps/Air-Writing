<!DOCTYPE html>
<html>
<head>
  <base href="/Air-Writing/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AirWriter Pro - Anti-Gravity Hand Tracking App">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AirWriter Pro">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <title>AirWriter Pro</title>
  <link rel="manifest" href="manifest.json">

  <!-- Optimization: Preconnect to external domains -->
  <link rel="preconnect" href="https://fonts.gstatic.com">

  <!-- MediaPipe dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <!-- Optimization: Inline critical CSS to prevent render-blocking and show a premium loader immediately -->
  <style>
    body {
      background-color: #000000; /* Deep black to match AntiGravityBase */
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    
    .glow-loader {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(187, 134, 252, 0.2);
      border-top-color: #BB86FC; /* Neon Purple */
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
      box-shadow: 0 0 20px rgba(187, 134, 252, 0.4);
      z-index: 1000;
      position: absolute;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    /* Hide the video element used for tracking */
    #input_video {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Optimized Loading Indicator -->
  <div class="glow-loader" id="loader"></div>
  
  <!-- MediaPipe Video Feed -->
  <video id="input_video" autoplay playsinline></video>
  
  <!-- MediaPipe Hand Tracking Logic -->
  <script>
    const videoElement = document.getElementById('input_video');
    const loader = document.getElementById('loader');

    // Initialize MediaPipe Hands
    const hands = new Hands({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});

    hands.setOptions({
      maxNumHands: 1, // Focus on one hand for writing
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults((results) => {
      // Hide loader once frames start processing
      if (loader) loader.style.display = 'none';

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        // Landmark 8 is the tip of the index finger
        const indexFingerTip = results.multiHandLandmarks[0][8];
        
        // Pass coordinates to Flutter if the function is exposed
        if (window.updateHandTracking) {
          // Note: MediaPipe x is normalized 0.0-1.0 from left-to-right.
          // Because of the camera mirror effect, we might need to invert x depending on desired UX.
          window.updateHandTracking(1.0 - indexFingerTip.x, indexFingerTip.y);
        }
      }
    });

    // Start Camera
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
      },
      width: 1280,
      height: 720
    });
    
    // Request permission and start
    camera.start().catch((err) => {
      console.error("Camera permissions denied or error:", err);
    });
  </script>

  <!-- Optimization: Asynchronously load Flutter's bootstrap script so it doesn't block HTML parsing -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
