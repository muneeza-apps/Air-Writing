<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AirWriter Pro - Anti-Gravity Hand Tracking App">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AirWriter Pro">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <title>AirWriter Pro</title>
  <link rel="manifest" href="manifest.json">

  <!-- Optimization: Preconnect to external domains -->
  <link rel="preconnect" href="https://fonts.gstatic.com">

  <!-- Optimization: Inline critical CSS to prevent render-blocking and show a premium loader immediately -->
  <style>
    body {
      background-color: #000000; /* Deep black to match AntiGravityBase */
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    
    .glow-loader {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(187, 134, 252, 0.2);
      border-top-color: #BB86FC; /* Neon Purple */
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
      box-shadow: 0 0 20px rgba(187, 134, 252, 0.4);
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <!-- Optimized Loading Indicator -->
  <div class="glow-loader"></div>
  
  <!-- Optimization: Asynchronously load Flutter's bootstrap script so it doesn't block HTML parsing -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
